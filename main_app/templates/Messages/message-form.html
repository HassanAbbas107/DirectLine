{% extends 'base.html' %}

{% block content %}
<div class="card" style="max-width: 600px;">
  <h2 class="card-title">
    {% if object %}Edit Comment{% else %}Add Comment{% endif %}
  </h2>
  
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    
    <div style="display: flex; gap: 16px; margin-top: 20px;">
      <a href="{% if object %}{% url 'call_detail' object.call.id %}{% else %}{% url 'call_list' %}{% endif %}" class="btn btn-secondary" style="flex: 1;">Cancel</a>
      <button type="submit" class="btn" style="flex: 2;">Save Comment</button>
    </div>
  </form>
</div>
{% endblock %}
