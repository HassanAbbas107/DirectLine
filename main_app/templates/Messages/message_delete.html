{% extends 'base.html' %}

{% block content %}
<div class="card" style="max-width: 460px; margin-top: 40px; text-align: center;">
  <h2 class="card-title" style="color: var(--danger);">Delete Comment</h2>
  <p style="color: var(--text-muted); margin-bottom: 20px;">
    Are you sure you want to delete this comment? This action is permanent.
  </p>
  <form method="post">
    {% csrf_token %}
    <div style="display: flex; gap: 12px;">
      <a href="{% url 'call_detail' object.call.id %}" class="btn btn-secondary" style="flex: 1;">Cancel</a>
      <button type="submit" class="btn btn-danger" style="flex: 1;">Yes, Delete</button>
    </div>
  </form>
</div>
{% endblock %}
